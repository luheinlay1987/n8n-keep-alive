name: Keep Hugging Face Space Alive

on:
  schedule:
    - cron: "0 2,14 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Check the n8n Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install --upgrade huggingface-hub
          python -c "from huggingface_hub import HfApi; HfApi().get_space_runtime('luheinlay1987/n8n')"
          echo "Successfully pinged Space at $(date)"
